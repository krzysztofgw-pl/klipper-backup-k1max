[homing_override]
axes: xyz
set_position_z: 0
gcode:
   {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}
   G90
   G1 Z1 F1200
   {% if home_all or 'X' in params %}
    _HOME_X
   {% endif %}
   {% if home_all or 'Y' in params %}
    _HOME_Y
   {% endif %}
   {% if home_all or 'Z' in params %}
    _HOME_Z
   {% endif %}

[gcode_macro _HOME_X]
gcode:
    # Always use consistent run_current on A/B steppers during sensorless homing
    {% set RUN_CURRENT_X = printer.configfile.settings['tmc5160 stepper_x'].run_current|float %}
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc5160 stepper_y'].run_current|float %}
    {% set RUN_ACCEL = printer.configfile.settings['printer'].max_accel|int %}
    {% set HOME_CURRENT = 0.5 %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT}
    AUTOTUNE_TMC STEPPER=stepper_x
    AUTOTUNE_TMC STEPPER=stepper_y
    SET_VELOCITY_LIMIT ACCEL=2000
    # Home
    G28 X0
    # Move away
    G91
    G1 X-4 F1800
    G90
    # Set current during print
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}
    AUTOTUNE_TMC STEPPER=stepper_x
    AUTOTUNE_TMC STEPPER=stepper_y
    SET_VELOCITY_LIMIT ACCEL={RUN_ACCEL}

[gcode_macro _HOME_Y]
gcode:
    # Always use consistent run_current on A/B steppers during sensorless homing
    {% set RUN_CURRENT_X = printer.configfile.settings['tmc5160 stepper_x'].run_current|float %}
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc5160 stepper_y'].run_current|float %}
    {% set RUN_ACCEL = printer.configfile.settings['printer'].max_accel|int %}
    {% set HOME_CURRENT = 0.5 %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT}
    AUTOTUNE_TMC STEPPER=stepper_x
    AUTOTUNE_TMC STEPPER=stepper_y
    SET_VELOCITY_LIMIT ACCEL=2000
    # Home
    G28 Y
    # Move away
    G1 Y+4 F1800
    # Set current during print
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}
    AUTOTUNE_TMC STEPPER=stepper_x
    AUTOTUNE_TMC STEPPER=stepper_y
    SET_VELOCITY_LIMIT ACCEL={RUN_ACCEL}

[gcode_macro _HOME_Z]
gcode:
    {% set cartographer = ('cartographer' in printer.configfile.settings) %}
    G1 X150 Y150 F18000
    # turn off bed heater for carto
    {% set TARGET_TEMP = printer.heater_bed.target %}
    M140 S0
    G4 P200
    G28 Z
    M140 S{TARGET_TEMP}