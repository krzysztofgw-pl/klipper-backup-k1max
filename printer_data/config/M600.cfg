[gcode_macro _PURGE]
gcode:
  LOAD_FILAMENT EXTRUDE_LENGTH=40

[gcode_macro M600]
description: Filament change dialogbox
variable_m600_state: 0
gcode:
  SET_GCODE_VARIABLE MACRO=M600 VARIABLE=m600_state VALUE=1
  M117 Filament check
  RESPOND TYPE=error MSG="Check filament !!"
# action
  PAUSE ; pause & park
  UNLOAD_FILAMENT
  M107 ; part fan OFF
  M107 P2 ; side fan OFF
# air_purifier delayed OFF
  UPDATE_DELAYED_GCODE ID=_PURIFIER_OFF DURATION=900 ; 30min
# idle_timeout
  SET_IDLE_TIMEOUT TIMEOUT=172800 ; 2days
### dialog box
  RESPOND TYPE=command MSG="action:prompt_begin Filament check detected!"
  RESPOND TYPE=command MSG="action:prompt_button_group_start"
  RESPOND TYPE=command MSG="action:prompt_button UNLOAD|UNLOAD_FILAMENT|secondary"
  RESPOND TYPE=command MSG="action:prompt_button LOAD|LOAD_FILAMENT|secondary"
  RESPOND TYPE=command MSG="action:prompt_button PURGE|_PURGE|secondary"
  RESPOND TYPE=command MSG="action:prompt_button_group_end"
  RESPOND TYPE=command MSG="action:prompt_footer_button CANCEL PRINT|CANCEL_PRINT|error"
  RESPOND TYPE=command MSG="action:prompt_footer_button IGNORE|RESPOND TYPE=command MSG=action:prompt_end|warning"
  RESPOND TYPE=command MSG="action:prompt_footer_button RESUME|RESUME|primary"
  RESPOND TYPE=command MSG="action:prompt_show"