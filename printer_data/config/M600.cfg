[gcode_macro _UNLOAD_FILAMENT]
gcode:
  SET_FILAMENT_SENSOR SENSOR=jam_sensor ENABLE=0 ; disable jam sensor
  SET_FILAMENT_SENSOR SENSOR=extruder_sensor ENABLE=0 ; disable filament sensor
  M109 S{printer['gcode_macro PRINTER_PARAM'].hotend_temp|int} ; restore hotend temp
  RESPOND TYPE=command MSG="Unloading filament..."
  G1 E10 F300
  G1 E-15 F3000
  G1 E-22.4700 F2400
  G1 E-6.4200 F1200
  G1 E-3.2100 F720
  G1 E5.0000 F356
  G1 E-5.0000 F384
  G1 E5.0000 F412
  G1 E-5.0000 F440
  G1 E5.0000 F467
  G1 E-5.0000 F495
  G1 E5.0000 F523
  G1 E-40 F3000
  M104 S0 ; hotend to 0
  RESPOND TYPE=command MSG="Unloading filament completed."

[gcode_macro _LOAD_FILAMENT]
gcode:
  M109 S{printer['gcode_macro PRINTER_PARAM'].hotend_temp|int} ; restore hotend temp
  M106 S{printer['gcode_macro PRINTER_PARAM'].part_fan_speed|int} ; restore part fan speed
  RESPOND TYPE=command MSG="Loading filament..."
  G1 E80 F180
  M400
  M104 S0 ; hotend to 0
  RESPOND TYPE=command MSG="Loading filament completed."

[gcode_macro _PURGE_MORE]
gcode:
  M109 S{printer['gcode_macro PRINTER_PARAM'].hotend_temp|int} ; restore hotend temp
  M106 S{printer['gcode_macro PRINTER_PARAM'].part_fan_speed|int} ; restore part fan speed
  RESPOND TYPE=command MSG="Purging..."
  G1 E40 F180
  M400
  M104 S0 ; hotend to 0
  RESPOND TYPE=command MSG="Purging completed."

[gcode_macro M600]
description: Filament change dialogbox.
variable_m600_state: 0
gcode:
  SET_GCODE_VARIABLE MACRO=M600 VARIABLE=m600_state VALUE=1
# print settings
  SET_GCODE_VARIABLE MACRO=PRINTER_PARAM VARIABLE=hotend_temp VALUE={printer.extruder.target}
  SET_GCODE_VARIABLE MACRO=PRINTER_PARAM VARIABLE=part_fan_speed VALUE={printer["fan_generic part_fan"].speed}
  SET_GCODE_VARIABLE MACRO=PRINTER_PARAM VARIABLE=side_fan_speed VALUE={printer["fan_generic side_fan"].speed}
  SET_GCODE_VARIABLE MACRO=PRINTER_PARAM VARIABLE=chamber_fan_target VALUE={printer["temperature_fan chamber_fan"].target}
# action
  RESPOND TYPE=error MSG="Check filament !!"
  PAUSE ; pause & park
  _UNLOAD_FILAMENT ; disable filament sensors, unload & hotend OFF
  M107 ; part fan OFF
  M107 P2 ; side fan OFF
# air_purifier delayed OFF
  UPDATE_DELAYED_GCODE ID=_PURIFIER_OFF DURATION=900 ; 30min
# idle_timeout
  SET_IDLE_TIMEOUT TIMEOUT=172800 ; 2days
### dialog box
  RESPOND TYPE=command MSG="action:prompt_begin Filament check detected!"
  RESPOND TYPE=command MSG="action:prompt_text A necessary filament check has been detected. Please LOAD a filament and click RESUME button."
  RESPOND TYPE=command MSG="action:prompt_button UNLOAD FILAMENT|_UNLOAD_FILAMENT|secondary"
  RESPOND TYPE=command MSG="action:prompt_button LOAD FILAMENT|_LOAD_FILAMENT|secondary"
  RESPOND TYPE=command MSG="action:prompt_button PURGE MORE FILAMENT|_PURGE_MORE|secondary"
  RESPOND TYPE=command MSG="action:prompt_footer_button CANCEL PRINT|CANCEL_PRINT|error"
  RESPOND TYPE=command MSG="action:prompt_footer_button IGNORE|RESPOND TYPE=command MSG=action:prompt_end|warning"
  RESPOND TYPE=command MSG="action:prompt_footer_button RESUME|RESUME|primary"
  RESPOND TYPE=command MSG="action:prompt_show"