[gcode_macro PRINTER_PARAM]
#variable_z_safe_pause: 2.0
#variable_z_safe_g28: 3.0
variable_max_x_position: 300.0
variable_max_y_position: 300.0
variable_max_z_position: 275.0
#variable_fans: 3
#variable_auto_g29: 0
variable_hotend_temp: 0
variable_chamber_fan_target: 0
variable_part_fan_speed: 0
variable_side_fan_speed: 0
variable_e_min_current: 0.27
gcode:

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos  : True ; use custom park coordinates for x,y [True/False] 
variable_custom_park_x   : 300.0 ; custom x position; value must be within your defined min and max of X
variable_custom_park_y   : 150.0 ; custom y position; value must be within your defined min and max of Y
variable_custom_park_dz   : 50.0 ; custom dz value; the value in mm to lift the nozzle when move to park position
variable_retract          : 1.0 ; the value to retract while PAUSE
variable_cancel_retract   : 5.0 ; the value to retract while CANCEL_PRINT
variable_speed_retract    : 30.0 ; retract speed in mm/s
variable_unretract        : 1.0 ; the value to unretract while RESUME
variable_speed_unretract  : 30.0 ; unretract speed in mm/s
variable_speed_hop        : 30.0 ; z move speed in mm/s
variable_speed_move       : 300.0 ; move speed in mm/s
variable_park_at_cancel   : False ; allow to move the toolhead to park while execute CANCEL_PRINT [True/False]
#variable_park_at_cancel_x : 300 ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
#variable_park_at_cancel_y : 150 ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
## !!! Caution [firmware_retraction] must be defined in the printer.cfg if you set use_fw_retract: True !!!
#variable_use_fw_retract   : False ; use fw_retraction instead of the manual version [True/False]
#variable_idle_timeout     : 0     ; time in sec until idle_timeout kicks in. Value 0 means that no value will be set or restored
variable_runout_sensor    : "filament_switch_sensor extruder_sensor"    ; If a sensor is defined, it will be used to cancel the execution of RESUME in case no filament is detected.
##                          Specify the config name of the runout sensor e.g "filament_switch_sensor runout". Hint use the same as in your printer.cfg
gcode:

[gcode_macro CG28]
description: Conditional homing.
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% endif %}

[gcode_macro QUICK_CLEAN_NOZZLE]
gcode:
  {% set TARGET_TEMP = printer.extruder.target %}
  CG28
# move nozzle to cleaning position
  G1 X130 Y303 Z2
  M109 S{TARGET_TEMP} ; wait for 0,8 of extruder temp
  M104 S150 ; start cooling to 150°C
  M106 P0 S255  ; set nozzle fan to max
  M400 ; wait for moves to finish
# clean nozzle
  G1 Z0 F300
  G1 X170 F300 ; wipe nozzle on the bed
  G1 X180 Z0.5 F21000 ; break a string
  G1 Z20 F300

# TURNING OF BED HEATER FOR CARTO
[gcode_macro Z_TILT_ADJUST]
rename_existing: _Z_TILT_ADJUST
gcode:
  {% set RUN_ACCEL = printer.configfile.settings['printer'].max_accel|int %}
  {% set TARGET_TEMP = printer.heater_bed.target %}
  SET_VELOCITY_LIMIT ACCEL=2000
  M140 S0
  _Z_TILT_ADJUST
  M140 S{TARGET_TEMP}
  SET_VELOCITY_LIMIT ACCEL={RUN_ACCEL}

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BED_MESH_CALIBRATE
description: Turns off the heater while scanning
gcode:
  {% set TARGET_TEMP = printer.heater_bed.target %}
  M140 S0
  _BED_MESH_CALIBRATE {rawparams}
  M140 S{TARGET_TEMP}

[gcode_macro CARTOGRAPHER_TOUCH]
rename_existing: _CARTOGRAPHER_TOUCH
description: Turns off the heater while touching
gcode:
  {% set TARGET_TEMP = printer.heater_bed.target %}
  M140 S0
  _CARTOGRAPHER_TOUCH
  M140 S{TARGET_TEMP}

[gcode_macro START_PRINT]
gcode:
  {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
  {% set BED_TEMP = params.BED_TEMP|default(40)|float %}
  {% set BED_TYPE = params.BED_TYPE|default("High Temp Plate") %}
  {% set RUN_ACCEL = printer.configfile.settings['printer'].max_accel|int %}
  RESPOND TYPE=command MSG="3D model received. Printing initiated."
  SET_FILAMENT_SENSOR SENSOR=jam_sensor ENABLE=0 ; disable jam sensor
  SET_GCODE_OFFSET Z=0 ; reset Z offset
# air_purifier ON
  SET_FAN_SPEED FAN=air_purifier SPEED=0.6
# preheating
  M104 S{EXTRUDER_TEMP*0.8}
  M140 S{BED_TEMP}
# chamber heating
  {% set CHAMBER_TEMP = printer["gcode_macro _CHAMBER_HEAT"].target %}
  {% if CHAMBER_TEMP > 35 %}
    SET_FAN_SPEED FAN=bed_fan SPEED=1
  {% endif %}
# homing
  CG28
  Z_TILT_ADJUST
  QUICK_CLEAN_NOZZLE
# cool down
  M106 P0 S205 ; set the nozzle fan to 80%
  M106 P2 S205 ; set the side fan to 80%
  G1 X300 Y150 F18000 ; park next to side fan
  M109 S150 ; cool nozzle to 150oC to reduce oozing
  M107 P0 ; turn the toolhead fan off
  M107 P2 ; turn the sidefan off
  G1 X150 Y150
  M190 S{BED_TEMP} ; wait for bed temperature before next step
# second home
  G1 Z2 F300
# touch_model by bed_type
  {% if BED_TYPE == "Textured PEI Plate" %}
        CARTOGRAPHER_TOUCH_MODEL LOAD=pei_textured
    {% else %}
        CARTOGRAPHER_TOUCH_MODEL LOAD=default
    {% endif %}
  CARTOGRAPHER_TOUCH_HOME
# meshing
  SET_VELOCITY_LIMIT ACCEL=2000 ; drop accels to prevent hyper agressive meshing
  BED_MESH_CLEAR ; clear current mesh
  G4 P1000 ; wait required to prevent MCU overload / fan to stop
  BED_MESH_CALIBRATE ADAPTIVE=1 ; start bedmesh calibrate
  SET_VELOCITY_LIMIT ACCEL={RUN_ACCEL}
# printing
  SMART_PARK ; park the printhead near the print area
  M1090 S{EXTRUDER_TEMP} ; stabilize nozzle temperature before next step
  LINE_PURGE ; create purge line near the print area of the part
  SKEW_PROFILE LOAD=calilantern ; use skew_profile
  UPDATE_DELAYED_GCODE ID=_ENABLE_JAM_SENSOR DURATION=5 ; enable jam sensor in 5s

[gcode_macro _PREP]
description: Preparation for next tasks.
gcode:
# air_purifier delayed OFF
  UPDATE_DELAYED_GCODE ID=_PURIFIER_OFF DURATION=900
# rest
  SET_PAUSE_NEXT_LAYER ENABLE=0
  SET_PAUSE_AT_LAYER ENABLE=0 LAYER=0
  SET_SKEW CLEAR=1
  BED_MESH_CLEAR
  CLEAR_PAUSE
  EXCLUDE_OBJECT_DEFINE RESET=1

[gcode_macro END_PRINT]
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
  {% set retract = client.cancel_retract | default(5.0) | float %}
  _CLIENT_RETRACT LENGTH={retract}
  COOL_DOWN
  TIMELAPSE_TAKE_FRAME ; timelapse
  _PREP

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print.
rename_existing: CANCEL_PRINT_BASE
variable_park: True
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
  {% set retract = client.cancel_retract | default(5.0) | float %}
# retract only if not already in the pause state and park set to true
  {% if printer.pause_resume.is_paused|lower == 'false' and park|lower == 'true'%}
    _CLIENT_RETRACT LENGTH={retract}
  {% endif %}
# if in M600
  {% if printer["gcode_macro M600"].m600_state == 1 %}
    RESPOND TYPE=command MSG="action:prompt_end"
    SET_GCODE_VARIABLE MACRO=M600 VARIABLE=m600_state VALUE=0
    SET_IDLE_TIMEOUT TIMEOUT=900 ; idle to default
    SET_FILAMENT_SENSOR SENSOR=extruder_sensor ENABLE=1 ; enable filament sensor
  


  CANCEL_PRINT_BASE
  _PREP

[gcode_macro PAUSE]
description: Pause the actual running print.
rename_existing: PAUSE_BASE
gcode:
# print settings
  SET_GCODE_VARIABLE MACRO=PRINTER_PARAM VARIABLE=hotend_temp VALUE={printer.extruder.target}
  SET_GCODE_VARIABLE MACRO=PRINTER_PARAM VARIABLE=part_fan_speed VALUE={printer["fan_generic part_fan"].speed}
  SET_GCODE_VARIABLE MACRO=PRINTER_PARAM VARIABLE=side_fan_speed VALUE={printer["fan_generic side_fan"].speed}
  SET_GCODE_VARIABLE MACRO=PRINTER_PARAM VARIABLE=chamber_fan_target VALUE={printer["temperature_fan chamber_fan"].target}
# retract & pause
  _CLIENT_RETRACT
  PAUSE_BASE
# rest position
  _TOOLHEAD_PARK X=300 Y=0

[gcode_macro RESUME]
description: Resume the actual running print.
rename_existing: RESUME_BASE
gcode:
# VELOCITY parameter if specified
  {% if 'VELOCITY' in params|upper %}
    {% set get_params = ('VELOCITY=' + params.VELOCITY)  %}
  {%else %}
    {% set get_params = "" %}
  {% endif %}
# if in M600
  {% if printer["gcode_macro M600"].m600_state == 1 %}
    RESPOND TYPE=command MSG="action:prompt_end"
    SET_GCODE_VARIABLE MACRO=M600 VARIABLE=m600_state VALUE=0
    SET_IDLE_TIMEOUT TIMEOUT=900 ; idle to default
    RESPOND TYPE=command MSG="Starting hotend heating..."
    M109 S{printer['gcode_macro PRINTER_PARAM'].hotend_temp|int} ; hotend ON
    M106 S{printer['gcode_macro PRINTER_PARAM'].part_fan_speed|int} ; restore fan speeds
    M106 P2 S{printer['gcode_macro PRINTER_PARAM'].side_fan_speed|int}
    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=chamber_fan TARGET={printer['gcode_macro PRINTER_PARAM'].chamber_fan_target} ; restore chamber target temp
    # filament sensors
    UPDATE_DELAYED_GCODE ID=_ENABLE_JAM_SENSOR DURATION=5 ; enable jam sensor in 5s
    SET_FILAMENT_SENSOR SENSOR=extruder_sensor ENABLE=1 ; enable filament sensor
  {% else %}
    _CLIENT_EXTRUDE ; detract after std pause
  {% endif %}
# resume
  RESPOND TYPE=command MSG="Resuming printing..."
  RESUME_BASE {get_params}

[gcode_macro LOAD_FILAMENT]
description: Load a filament into the hotend.
gcode:
  SAVE_GCODE_STATE NAME=state_preload
  {% set EXTRUDE_LENGTH = params.EXTRUDE_LENGTH|default(80)|float %}
  {% set EXTRUDE_SPEED = params.EXTRUDE_SPEED|default(5)|float %}
  {% set RETRACT_LENGTH = params.RETRACT_LENGTH|default(2)|float %}
  {% set TEMPERATURE = params.TEMPERATURE|default(220)|float %}
  SET_FILAMENT_SENSOR SENSOR=jam_sensor ENABLE=0 ; disable jam sensor
  RESPOND TYPE=command MSG="Heating up to load filament..."
  M109 S{TEMPERATURE}
  RESPOND TYPE=command MSG="Loading filament..."
  #G92 E0
  M83
  G1 E{EXTRUDE_LENGTH} F{EXTRUDE_SPEED * 60}
  G1 E-{RETRACT_LENGTH} F{EXTRUDE_SPEED * 60}
  M400
  M109 S0 ; turn off hotend
  RESPOND TYPE=command MSG="Loading filament completed."
  SET_FILAMENT_SENSOR SENSOR=jam_sensor ENABLE=1 ; enable jam sensor
  RESTORE_GCODE_STATE NAME=state_preload MOVE=1

[gcode_macro UNLOAD_FILAMENT]
description: Unload the filament from the hotend.
gcode:
  SAVE_GCODE_STATE NAME=state_preunload
  {% set TEMPERATURE = params.TEMPERATURE|default(220)|float %}
  SET_FILAMENT_SENSOR SENSOR=jam_sensor ENABLE=0 ; disable jam sensor
  RESPOND TYPE=command MSG="Heating up to unload filament..."
  M109 S{TEMPERATURE}
  RESPOND TYPE=command MSG="Unloading filament..."
  M83
  G1 E10 F300
  G1 E-15 F3000
  G1 E-22.47 F2400
  G1 E-6.42 F1200
  G1 E-3.21 F720
  G1 E5 F356
  G1 E-5 F384
  G1 E5 F412
  G1 E-5 F440
  G1 E5 F467
  G1 E-5 F495
  G1 E5 F523
  G1 E-40 F3000
  M400
  M109 S0 ; turn off hotend
  RESPOND TYPE=command MSG="Unloading filament completed."
  SET_FILAMENT_SENSOR SENSOR=jam_sensor ENABLE=1 ; enable jam sensor
  RESTORE_GCODE_STATE NAME=state_preunload MOVE=1

##### ADDITIONAL MACROS (M106, M107, etc) #####

[delayed_gcode _CLEAR_DISPLAY]
gcode:
  M117

[gcode_macro M106]
description: Set fan speed. P0 for part, P2 for auxiliary; P3 for chamber. ; P3 turned to temperature_fan.
gcode:
  {% set fan_map = {0: "part_fan", 2: "side_fan"} %}
  {% set fan_id = params.P|default(0)|int %}
  {% set fan = fan_map[fan_id] %}
  {% set speed_param = params.S|default(255)|int %}
  {% if speed_param > 0 %}
    {% set speed = (speed_param|float / 255) %}
  {% else %}
    {% set speed = 0 %}
  {% endif %}
  SET_FAN_SPEED FAN={fan} SPEED={speed}

[gcode_macro M107]
description: Set fan off. P0 for part, P2 for auxiliary; P3 for chamber. ; P3 turned to temperature_fan.
gcode:
  {% set fan_map = {0: "part_fan", 2: "side_fan"} %}
  {% set fan_id = params.P|default(0)|int %}
  {% set fan = fan_map[fan_id] %}
  SET_FAN_SPEED FAN={fan} SPEED=0

[gcode_macro M109]
description: Wait for the hotend temp before proceeding (does not wait to stabilize).
rename_existing: M1090
gcode:
  {% set s = params.S|float %}
  M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}  ; Set hotend temp
  {% if s != 0 %}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} MAXIMUM={s+1}   ; Wait for hotend temp (within 1 degree)
  {% endif %}

[gcode_macro M190]
description: Wait for the bed temp before proceeding (does not wait to stabilize).
rename_existing: M1900
gcode:
  {% set s = params.S|float %}
   M140 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}  ; Set bed temp
  {% if s != 0 %}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s} MAXIMUM={s+1}   ; Wait for bed temp (within 1 degree)
  {% endif %}

[gcode_macro _CHAMBER_HEAT]
variable_target: 0
gcode:
  {% set T = params.TEMP|default(0)|int %}
  SET_GCODE_VARIABLE MACRO=_CHAMBER_HEAT VARIABLE=target VALUE={T}
  RESPOND TYPE=command MSG="Heatig chamber target {T}°C"
  UPDATE_DELAYED_GCODE ID=_CHAMBER_LOOP DURATION=5

[delayed_gcode _CHAMBER_LOOP]
gcode:
  {% set target = printer["gcode_macro _CHAMBER_HEAT"].target %}
  {% if target > 0 %}
    {% set current = printer["temperature_sensor chamber_temp"].temperature %}
    {% if current < target %}
      SET_FAN_SPEED FAN=bed_fan SPEED=1
    {% elif current > (target + 0.5) %}
      SET_FAN_SPEED FAN=bed_fan SPEED=0
    {% endif %}
    UPDATE_DELAYED_GCODE ID=_CHAMBER_LOOP DURATION=5
  {% else %}
    SET_FAN_SPEED FAN=bed_fan SPEED=0
  {% endif %}

[gcode_macro M141]
description: Set chamber temperature (end code).
gcode:
  _CHAMBER_HEAT TEMP=35

[gcode_macro M191]
description: Set chamber heater target.
gcode:
  {% set s = params.S|float %}
  SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=chamber_fan TARGET={s}
  _CHAMBER_HEAT TEMP={s}

[gcode_macro _TOOLHEAD_PARK]
description: Helper: park toolhead used in PAUSE and CANCEL_PRINT
gcode:
  ##### get user parameters or use default #####
  {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
  {% set use_custom     = client.use_custom_pos | default(false) | lower == 'true' %}
  {% set custom_park_x  = client.custom_park_x | default(300) %}
  {% set custom_park_y  = client.custom_park_y | default(150) %}
  {% set park_dz        = client.custom_park_dz | default(50) | abs %}
  {% set sp_hop         = client.speed_hop | default(10) * 60 %}
  {% set sp_move        = client.speed_move | default(300) * 60 %}
  ##### get config and toolhead values #####
  {% set origin    = printer.gcode_move.homing_origin %}
  {% set act       = printer.gcode_move.gcode_position %}
  {% set max       = printer.toolhead.axis_maximum %}
  {% set min       = printer.toolhead.axis_minimum %}  
  ##### define park position #####
  {% set z_min = params.Z_MIN | default(0) | float %}
  {% set z_park = [[(act.z + park_dz), z_min] | max, (max.z - origin.z)] | min %}
  {% set x_park = params.X       if params.X is defined
             else custom_park_x  if use_custom
             else (max.x - 3.0) %}
  {% set y_park = params.Y       if params.Y is defined
             else custom_park_y  if use_custom
             else (min.y + 1.0) %}
  ##### end of definitions #####
  G1 Z{z_park} F{sp_hop}
  G1 X{x_park} Y{y_park} F{sp_move}

[gcode_macro COOL_DOWN]
description: Cool down the hotend next to the side fan.
gcode:
  TURN_OFF_HEATERS
  CG28
  _TOOLHEAD_PARK 
  M106 S205 ; set the nozzle fan to 80%
  M106 P2 S205 ; set the side fan to 80%
  M109 S150 ; cool nozzle to 150oC to reduce oozing
  TURN_OFF_HEATERS
  M107 ; turn the toolhead fan off
  M107 P2 ; turn the sidefan off
  
[delayed_gcode _ENABLE_JAM_SENSOR]
gcode:
  SET_FILAMENT_SENSOR SENSOR=jam_sensor ENABLE=1

[delayed_gcode _PURIFIER_OFF]
gcode:
  SET_FAN_SPEED FAN=air_purifier SPEED=0

[gcode_macro _CLIENT_EXTRUDE]
description: Extrudes if the extruder is hot enough.
gcode:
  ##### get user parameters or use default #####
  {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
  {% set use_fw_retract = (client.use_fw_retract | default(false) | lower == 'true') and (printer.firmware_retraction is defined) %}
  {% set length = params.LENGTH | default(client.unretract) | default(1.0) | float %}
  {% set speed = params.SPEED | default(client.speed_unretract) | default(30) %}
  ##### end of definitions #####
  {% if printer.toolhead.extruder != '' %}
    {% if printer[printer.toolhead.extruder].can_extrude %}
      {% if use_fw_retract %}
        G11
      {% else %}
        G1 E{length} F{(speed | float | abs) * 60}
      {% endif %}
    {% else %}
      RESPOND TYPE=error MSG='Extruder not hot enough!!'
    {% endif %}
  {% endif %}

[gcode_macro _CLIENT_RETRACT]
description: Retracts if the extruder is hot enough
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
  {% set length = params.LENGTH | default(client.retract) | default(1.0) | float %}
  {% set speed = params.SPEED | default(client.speed_retract) | default(35) %}
  _CLIENT_EXTRUDE LENGTH=-{length | float | abs} SPEED={speed | float | abs}

##### WARMUP #####

[gcode_macro WARMUP]
description: Stress Test
variable_maxd: 14142.14 ; = SQRT(2*maxy)
gcode:
  {% set min_loops = 2 %}
  {% set max_loops = params.LOOPS|default(3)|int %}
  {% if 'LOOPS' in params|upper %}
    {% if max_loops < min_loops %}
      {% set max_loops = min_loops %}
    {% endif %}
  {% endif %}
  {% set loop_cnt = max_loops %}
  {% set maxx = params.X_ACCEL_MAX|default(12000)|int %}
  {% set maxy = params.Y_ACCEL_MAX|default(12000)|int %}
  {% set max_x = (printer.toolhead.axis_maximum.x|int-5) %}
  {% set max_y = (printer.toolhead.axis_maximum.y|int-5) %}
  {% set loop_step_y = max_y//(loop_cnt-1) %}
  {% set loop_step_x = max_x//(loop_cnt-1) %}
  {% set y_park = printer.toolhead.axis_maximum.y/2 %}
  {% set x_park = printer.toolhead.axis_maximum.x|float - 10.0 %}
  CG28
  SET_VELOCITY_LIMIT ACCEL={maxx}
  {% for number in range(10,max_y+11,loop_step_y) %}
    {% if number >= max_y %}
    {% set number = max_y %}
    {% endif %}
    G1 F{maxy} X10 Y{number}
    G1 F{maxx} X{max_x} Y{number}
  {% endfor %}
  SET_VELOCITY_LIMIT ACCEL={maxy}
  {% for number in range(10,max_x+11,loop_step_y) %}
    {% if number >= max_x %}
    {% set number = max_x %}
    {% endif %}
    G1 F{maxy} X{number} Y{max_y}
    G1 F{maxy} X{number} Y10
  {% endfor %}
  SET_VELOCITY_LIMIT ACCEL={maxd}
  {% for times in range(loop_cnt) %}
    G1 F{maxx} X10 Y10
    G1 F{maxd} X{max_x} Y{max_y}
    G1 F{maxx} X10 Y{max_y}
    G1 F{maxd} X{max_x} Y10
    G1 F{maxy} X{max_x} Y{max_y}
    G1 F{maxd} X10 Y10
    G1 F{maxy} X10 Y{max_y}
    G1 F{maxd} X{max_x} Y10
  {% endfor %}
  SET_VELOCITY_LIMIT ACCEL={maxx}
  {% for times in range(loop_cnt) %}
    G1 F{maxy} X10 Y10
    G1 F{maxy} X10 Y{max_y}
    G1 F{maxx} X{max_x} Y{max_y}
    G1 F{maxy} X{max_x} Y10
    G1 F{maxx} X10 Y10
    G1 F{maxx} X{max_x} Y10
    G1 F{maxy} X{max_x} Y{max_y}
    G1 F{maxx} X10 Y{max_y}
  {% endfor %}
  G1 X{x_park} Y{y_park} F18000

##### PID MACROS #####

[gcode_macro PID_BED]
description: Start Bed PID
gcode:
  PID_CALIBRATE HEATER=heater_bed TARGET={params.BED_TEMP|default(70)}
  TURN_OFF_HEATERS
  SAVE_CONFIG

[gcode_macro PID_HOTEND]
description: Start Hotend PID
gcode:
  CG28
  G1 X150 Y150 Z10 F18000
  M106
  PID_CALIBRATE HEATER=extruder TARGET={params.HOTEND_TEMP|default(250)}
  COOL_DOWN
  SAVE_CONFIG